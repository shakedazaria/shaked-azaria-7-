name: Run Daily Stock Scanner

on:
  schedule:
    # ירוץ בימים שני עד שישי בשעה 05:00 UTC (שזה 08:00 בבוקר שעון קיץ בישראל)
    - cron: '0 5 * * 1-5'
  workflow_dispatch: # מאפשר הפעלה ידנית בלחיצת כפתור

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Copy code to virtual machine
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scanner script
      env:
        # הזרקת ה-Secrets מהכספת
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
      run: python3 stock_scanner.py
