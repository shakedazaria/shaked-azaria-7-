name: Run Daily Stock Scanner

on:
  schedule:
    # ירוץ בימים שני עד שישי בשעה 05:00 UTC (שזה 08:00 בבוקר שעון קיץ בישראל)
    - cron: '0 5 * * 1-5'
  workflow_dispatch: # מאפשר לך להפעיל את הסורק ידנית בכל רגע לצרכי בדיקה

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Copy code to virtual machine
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scanner script
      env:
        # הזרקת המפתחות מהכספת לתוך הריצה של פייתון
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TWILIO_KEY: ${{ secrets.TWILIO_KEY }}
        # אם יש לך מפתחות נוספים בכספת, תוכל להוסיף אותם כאן באותו מבנה בדיוק
      run: shaked azaria 7  ⚠️ החלף את זה בשם המדויק של קובץ הפייתון שלך!
